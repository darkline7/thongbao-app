<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PT Noti — Grow a Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f0ede8;--color-border:rgba(40,37,29,.10);
  --color-divider:#dcd9d5;--color-text:#28251d;--color-text-muted:#7a7974;
  --color-text-faint:#bab9b4;--color-text-inverse:#f9f8f4;
  --color-primary:#2d7f2b;--color-primary-hover:#236120;--color-primary-hl:#d0e8cf;
  --color-accent:#f5a623;--color-accent-hl:#fde9c4;
  --color-rare:#8b5cf6;--color-rare-hl:#ede5fa;
  --color-error:#c0392b;--color-success:#27ae60;
  --shadow-sm:0 1px 3px rgba(0,0,0,.07);--shadow-md:0 4px 14px rgba(0,0,0,.09);
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --font-display:'Space Grotesk',sans-serif;--font-body:'Inter',sans-serif;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);--text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);--text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);--transition:180ms cubic-bezier(.16,1,.3,1);
}
[data-theme="dark"]{
  --color-bg:#0f1a0e;--color-surface:#141f13;--color-surface-2:#192518;
  --color-surface-offset:#1e2b1d;--color-border:rgba(255,255,255,.08);
  --color-divider:#243423;--color-text:#d4e8d3;--color-text-muted:#7a9478;
  --color-text-faint:#4a6048;--color-text-inverse:#182518;
  --color-primary:#4caf50;--color-primary-hover:#66bb6a;--color-primary-hl:#1a3019;
  --color-accent:#ffb74d;--color-accent-hl:#3d2c10;
  --color-rare:#b39ddb;--color-rare-hl:#2d2242;
  --color-error:#ef5350;--color-success:#66bb6a;
  --shadow-sm:0 1px 3px rgba(0,0,0,.3);--shadow-md:0 4px 14px rgba(0,0,0,.4);
}
@media(prefers-color-scheme:dark){:root:not([data-theme]){
  --color-bg:#0f1a0e;--color-surface:#141f13;--color-surface-2:#192518;
  --color-surface-offset:#1e2b1d;--color-border:rgba(255,255,255,.08);
  --color-divider:#243423;--color-text:#d4e8d3;--color-text-muted:#7a9478;
  --color-text-faint:#4a6048;--color-primary:#4caf50;--color-primary-hover:#66bb6a;
  --color-primary-hl:#1a3019;--color-accent:#ffb74d;--color-accent-hl:#3d2c10;
  --color-rare:#b39ddb;--color-rare-hl:#2d2242;--color-error:#ef5350;--color-success:#66bb6a;
}}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;scroll-behavior:smooth}
body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);transition:background var(--transition),color var(--transition)}
img{display:block;max-width:100%;height:auto}
button{cursor:pointer;background:none;border:none;font:inherit;color:inherit;transition:all var(--transition)}
::selection{background:color-mix(in oklch,var(--color-primary) 25%,transparent);color:var(--color-text)}
:focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm)}
.app{display:grid;grid-template-columns:260px 1fr;min-height:100dvh}
@media(max-width:768px){.app{grid-template-columns:1fr;grid-template-rows:auto 1fr auto}}
.sidebar{background:var(--color-surface);border-right:1px solid var(--color-border);padding:var(--space-6) var(--space-4);display:flex;flex-direction:column;gap:var(--space-6);position:sticky;top:0;height:100dvh;overflow-y:auto}
@media(max-width:768px){.sidebar{display:none}}
.logo{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2)}
.logo-text{font-family:var(--font-display);font-weight:700;font-size:var(--text-lg);color:var(--color-primary);line-height:1}
.logo-sub{font-size:var(--text-xs);color:var(--color-text-muted);margin-top:2px}
.nav{display:flex;flex-direction:column;gap:var(--space-1)}
.nav-label{font-size:var(--text-xs);font-weight:600;color:var(--color-text-faint);text-transform:uppercase;letter-spacing:.08em;padding:var(--space-2) var(--space-3);margin-top:var(--space-3)}
.nav-item{display:flex;align-items:center;gap:var(--space-3);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--color-text-muted);font-size:var(--text-sm);font-weight:500;cursor:pointer;text-decoration:none;border:none;width:100%;text-align:left;background:none}
.nav-item:hover{background:var(--color-surface-offset);color:var(--color-text)}
.nav-item.active{background:var(--color-primary-hl);color:var(--color-primary)}
.nav-item svg{width:18px;height:18px;flex-shrink:0}
.sidebar-footer{margin-top:auto}
.status-badge{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-3);border-radius:var(--radius-lg);background:var(--color-surface-2);border:1px solid var(--color-border)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.green{background:var(--color-success);animation:pulse 2s infinite}
.status-dot.red{background:var(--color-error)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 color-mix(in oklch,var(--color-success) 50%,transparent)}50%{box-shadow:0 0 0 6px transparent}}
.status-text{font-size:var(--text-xs);color:var(--color-text-muted)}
.status-text strong{color:var(--color-text);display:block;font-size:var(--text-sm)}
.main{display:flex;flex-direction:column;min-width:0}
.topbar{background:var(--color-surface);border-bottom:1px solid var(--color-border);padding:var(--space-4) var(--space-6);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;gap:var(--space-4)}
@media(max-width:768px){.topbar{padding:var(--space-3) var(--space-4)}}
.topbar-left{display:flex;align-items:center;gap:var(--space-3)}
.mobile-logo{display:none;align-items:center;gap:var(--space-2);font-family:var(--font-display);font-weight:700;font-size:var(--text-lg);color:var(--color-primary)}
@media(max-width:768px){.mobile-logo{display:flex}}
.page-title{font-family:var(--font-display);font-size:var(--text-xl);font-weight:700;line-height:1}
@media(max-width:768px){.page-title{display:none}}
.topbar-right{display:flex;align-items:center;gap:var(--space-3)}
.icon-btn{width:38px;height:38px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;color:var(--color-text-muted)}
.icon-btn:hover{background:var(--color-surface-offset);color:var(--color-text)}
.refresh-btn{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);background:var(--color-primary);color:white;font-size:var(--text-sm);font-weight:600}
.refresh-btn:hover{background:var(--color-primary-hover)}
.refresh-btn:disabled{opacity:.5;cursor:not-allowed}
.refresh-btn svg{width:16px;height:16px}
.refresh-btn.spinning svg{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.last-updated{font-size:var(--text-xs);color:var(--color-text-faint)}
.content{padding:var(--space-6);display:flex;flex-direction:column;gap:var(--space-6);flex:1}
@media(max-width:768px){.content{padding:var(--space-4);gap:var(--space-4)}}
.slot-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:var(--space-3)}
.slot-info{display:flex;align-items:center;gap:var(--space-3)}
.slot-badge{padding:var(--space-1) var(--space-3);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.slot-badge.paid{background:var(--color-accent-hl);color:var(--color-accent)}
.slot-badge.free{background:var(--color-primary-hl);color:var(--color-primary)}
.slot-number{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700}
.countdown{display:flex;align-items:center;gap:var(--space-2);padding:var(--space-2) var(--space-4);border-radius:var(--radius-lg);background:var(--color-surface);border:1px solid var(--color-border)}
.countdown-timer{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;font-variant-numeric:tabular-nums;color:var(--color-accent)}
.countdown-label{font-size:var(--text-xs);color:var(--color-text-muted)}
.section-header{display:flex;align-items:center;gap:var(--space-3);margin-bottom:var(--space-4)}
.section-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700}
.section-count{padding:var(--space-1) var(--space-2);background:var(--color-surface-offset);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;color:var(--color-text-muted)}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(160px,100%),1fr));gap:var(--space-3)}
@media(max-width:480px){.item-grid{grid-template-columns:repeat(2,1fr)}}
.item-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-4);display:flex;flex-direction:column;align-items:center;gap:var(--space-3);transition:box-shadow var(--transition),transform var(--transition);position:relative;overflow:hidden}
.item-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.item-card.rare{border-color:color-mix(in oklch,var(--color-rare) 40%,transparent)}
.item-card.rare::before{content:"";position:absolute;inset:0;background:color-mix(in oklch,var(--color-rare) 6%,transparent);pointer-events:none}
.item-emoji{font-size:2.5rem;line-height:1}
.item-name{font-size:var(--text-sm);font-weight:600;text-align:center;line-height:1.3}
.item-name-en{font-size:var(--text-xs);color:var(--color-text-muted);text-align:center}
.item-count{display:flex;align-items:center;justify-content:center;min-width:32px;height:24px;padding:0 var(--space-2);background:var(--color-primary-hl);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;color:var(--color-primary)}
.item-count.rare-count{background:var(--color-rare-hl);color:var(--color-rare)}
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(200px,100%),1fr));gap:var(--space-3)}
.tool-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-4) var(--space-5);display:flex;align-items:center;gap:var(--space-4);transition:box-shadow var(--transition),transform var(--transition)}
.tool-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.tool-emoji{font-size:2rem;flex-shrink:0}
.tool-info{flex:1;min-width:0}
.tool-name{font-size:var(--text-sm);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tool-name-en{font-size:var(--text-xs);color:var(--color-text-muted)}
.tool-qty{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:var(--radius-md);background:var(--color-accent-hl);font-weight:800;color:var(--color-accent);flex-shrink:0}
.weather-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5);display:flex;align-items:center;gap:var(--space-4)}
.weather-emoji{font-size:3rem}
.weather-title{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-1)}
.weather-sub{font-size:var(--text-sm);color:var(--color-text-muted)}
.weather-empty,.announce-empty{text-align:center;padding:var(--space-8);color:var(--color-text-muted);font-size:var(--text-sm);background:var(--color-surface);border:1px dashed var(--color-border);border-radius:var(--radius-xl)}
.announce-list{display:flex;flex-direction:column;gap:var(--space-3)}
.announce-item{background:var(--color-surface);border:1px solid var(--color-border);border-left:3px solid var(--color-primary);border-radius:var(--radius-lg);padding:var(--space-4) var(--space-5)}
.announce-title{font-weight:600;margin-bottom:var(--space-1)}
.announce-body{font-size:var(--text-sm);color:var(--color-text-muted);line-height:1.6}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skeleton{background:linear-gradient(90deg,var(--color-surface-offset) 25%,var(--color-surface-2) 50%,var(--color-surface-offset) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:var(--radius-md)}
.mobile-nav{display:none;background:var(--color-surface);border-top:1px solid var(--color-border);padding:var(--space-2);position:sticky;bottom:0;z-index:10}
@media(max-width:768px){.mobile-nav{display:flex;justify-content:space-around}}
.mobile-nav-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:var(--space-2) var(--space-3);border-radius:var(--radius-lg);font-size:10px;color:var(--color-text-muted);cursor:pointer;min-width:48px;border:none;background:none;font-family:var(--font-body)}
.mobile-nav-item svg{width:22px;height:22px}
.mobile-nav-item.active{color:var(--color-primary);background:var(--color-primary-hl)}
.page{display:none}.page.active{display:flex;flex-direction:column;gap:var(--space-6)}
.profile-card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-6);display:flex;align-items:center;gap:var(--space-5)}
.avatar{width:72px;height:72px;border-radius:50%;background:var(--color-primary-hl);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;border:3px solid var(--color-primary)}
.profile-info{flex:1}
.profile-name{font-family:var(--font-display);font-size:var(--text-lg);font-weight:700}
.profile-email{font-size:var(--text-sm);color:var(--color-text-muted);margin-top:2px}
.plan-badge{display:inline-flex;padding:2px var(--space-2);border-radius:var(--radius-full);font-size:var(--text-xs);font-weight:700;margin-top:var(--space-2)}
.plan-badge.free{background:var(--color-surface-offset);color:var(--color-text-muted)}
.plan-badge.pro{background:var(--color-accent-hl);color:var(--color-accent)}
.credit-row{display:flex;gap:var(--space-3);margin-top:var(--space-2)}
.credit-chip{padding:var(--space-1) var(--space-3);background:var(--color-surface-offset);border-radius:var(--radius-full);font-size:var(--text-xs);color:var(--color-text-muted)}
.credit-chip strong{color:var(--color-text)}
.game-id-section{background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-5)}
.game-id-title{font-family:var(--font-display);font-size:var(--text-base);font-weight:700;margin-bottom:var(--space-4)}
.game-id-form{display:flex;gap:var(--space-3)}
@media(max-width:480px){.game-id-form{flex-direction:column}}
.input{flex:1;padding:var(--space-3) var(--space-4);background:var(--color-surface-2);border:1.5px solid var(--color-border);border-radius:var(--radius-md);color:var(--color-text);font-size:var(--text-sm);font-family:var(--font-body)}
.input:focus{outline:none;border-color:var(--color-primary)}
.btn-primary{padding:var(--space-3) var(--space-5);background:var(--color-primary);color:white;border-radius:var(--radius-md);font-size:var(--text-sm);font-weight:600;white-space:nowrap;border:none;cursor:pointer}
.btn-primary:hover{background:var(--color-primary-hover)}
.game-accounts{display:flex;flex-direction:column;gap:var(--space-2);margin-top:var(--space-4)}
.account-item{display:flex;align-items:center;justify-content:space-between;padding:var(--space-3) var(--space-4);background:var(--color-surface-offset);border-radius:var(--radius-lg)}
.account-id{font-family:monospace;font-size:var(--text-sm);font-weight:600;letter-spacing:.05em}
.account-name{font-size:var(--text-xs);color:var(--color-text-muted)}
.form-msg{font-size:var(--text-xs);margin-top:var(--space-2);padding:var(--space-2) var(--space-3);border-radius:var(--radius-md)}
.form-msg.ok{background:var(--color-primary-hl);color:var(--color-primary)}
.form-msg.err{background:color-mix(in oklch,var(--color-error) 12%,transparent);color:var(--color-error)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-label="PT Noti">
        <rect width="36" height="36" rx="10" fill="var(--color-primary)"/>
        <path d="M10 26L18 10L26 26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="18" cy="20" r="2.5" fill="white"/>
      </svg>
      <div><div class="logo-text">PT Noti</div><div class="logo-sub">Grow a Garden</div></div>
    </div>
    <nav class="nav">
      <div class="nav-label">Menu</div>
      <button class="nav-item active" data-page="shop" onclick="switchPage('shop',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Cửa hàng hôm nay
      </button>
      <button class="nav-item" data-page="weather" onclick="switchPage('weather',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 110-14h.5M18 8.5A4.5 4.5 0 1118 17h-.5"/></svg>
        Thời tiết
      </button>
      <button class="nav-item" data-page="announce" onclick="switchPage('announce',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
        Thông báo
      </button>
      <button class="nav-item" data-page="profile" onclick="switchPage('profile',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Tài khoản
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="status-badge">
        <div class="status-dot green" id="ws-dot"></div>
        <div class="status-text"><strong id="ws-status">Đang kết nối…</strong><span id="ws-detail">Live / HTTP Polling</span></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <div class="mobile-logo">
          <svg width="28" height="28" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="10" fill="var(--color-primary)"/><path d="M10 26L18 10L26 26" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="18" cy="20" r="2.5" fill="white"/></svg>
          PT Noti
        </div>
        <h1 class="page-title" id="page-title">Cửa hàng hôm nay</h1>
      </div>
      <div class="topbar-right">
        <span class="last-updated" id="last-updated">–</span>
        <button class="refresh-btn" id="refresh-btn" onclick="fetchAll()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          Làm mới
        </button>
        <button class="icon-btn" onclick="toggleTheme()" aria-label="Đổi giao diện">
          <svg id="theme-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
      </div>
    </header>

    <div class="content">
      <div class="page active" id="page-shop">
        <div class="slot-header">
          <div class="slot-info">
            <span class="slot-badge paid" id="slot-badge">Trả phí</span>
            <span class="slot-number" id="slot-number">Time Slot –</span>
          </div>
          <div class="countdown">
            <div><div class="countdown-label">Đổi lịch sau</div><div class="countdown-timer" id="countdown">05:00</div></div>
          </div>
        </div>
        <div>
          <div class="section-header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2"><path d="M12 22V12M12 12C12 6.5 6 3 6 3s0 8 6 9zM12 12c0-5.5 6-9 6-9s0 8-6 9z"/></svg>
            <span class="section-title">Hạt Giống</span>
            <span class="section-count" id="seed-count">–</span>
          </div>
          <div class="item-grid" id="seed-grid">
            <div class="skeleton" style="height:160px;border-radius:var(--radius-xl)"></div>
            <div class="skeleton" style="height:160px;border-radius:var(--radius-xl)"></div>
            <div class="skeleton" style="height:160px;border-radius:var(--radius-xl)"></div>
            <div class="skeleton" style="height:160px;border-radius:var(--radius-xl)"></div>
          </div>
        </div>
        <div>
          <div class="section-header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-accent)" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
            <span class="section-title">Công Cụ</span>
            <span class="section-count" id="tool-count">–</span>
          </div>
          <div class="tool-grid" id="tool-grid">
            <div class="skeleton" style="height:80px;border-radius:var(--radius-xl)"></div>
          </div>
        </div>
      </div>

      <div class="page" id="page-weather">
        <div class="section-header">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2"><path d="M17.5 19H9a7 7 0 110-14h.5M18 8.5A4.5 4.5 0 1118 17h-.5"/></svg>
          <span class="section-title">Thời Tiết Hôm Nay</span>
        </div>
        <div id="weather-content"><div class="weather-empty">Đang tải dữ liệu thời tiết…</div></div>
      </div>

      <div class="page" id="page-announce">
        <div class="section-header">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
          <span class="section-title">Thông Báo</span>
        </div>
        <div class="announce-list" id="announce-list"><div class="announce-empty">Đang tải thông báo…</div></div>
      </div>

      <div class="page" id="page-profile">
        <div class="profile-card">
          <div class="avatar">🌱</div>
          <div class="profile-info">
            <div class="profile-name" id="profile-name">Chưa đăng nhập</div>
            <div class="profile-email" id="profile-email">–</div>
            <div class="plan-badge free" id="plan-badge">Free</div>
            <div class="credit-row">
              <div class="credit-chip">Credit: <strong id="credit-val">0</strong></div>
              <div class="credit-chip">Bonus: <strong id="credit-bonus-val">0</strong></div>
            </div>
          </div>
        </div>
        <div class="game-id-section">
          <div class="game-id-title">🎮 Liên kết Game ID</div>
          <div class="game-id-form">
            <input class="input" id="game-id-input" type="text" placeholder="Nhập Game ID (VD: ABCD-EFGH-IJKL)" maxlength="14" oninput="formatGameId(this)">
            <button class="btn-primary" onclick="linkGameId()">Liên kết</button>
          </div>
          <div id="game-id-msg" style="display:none" class="form-msg"></div>
          <div class="game-accounts" id="game-accounts"></div>
        </div>
      </div>
    </div>

    <nav class="mobile-nav">
      <button class="mobile-nav-item active" data-page="shop" onclick="switchPage('shop',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Shop
      </button>
      <button class="mobile-nav-item" data-page="weather" onclick="switchPage('weather',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.5 19H9a7 7 0 110-14h.5M18 8.5A4.5 4.5 0 1118 17h-.5"/></svg>Thời tiết
      </button>
      <button class="mobile-nav-item" data-page="announce" onclick="switchPage('announce',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>Thông báo
      </button>
      <button class="mobile-nav-item" data-page="profile" onclick="switchPage('profile',this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Tài khoản
      </button>
    </nav>
  </div>
</div>

<script>
const SEED_INFO={carrot_seed:{vi:"Hạt Cà Rốt",emoji:"🥕"},strawberry_seed:{vi:"Hạt Dâu Tây",emoji:"🍓"},blueberry_seed:{vi:"Hạt Việt Quất",emoji:"🫐"},mushroom_seed:{vi:"Hạt Nấm",emoji:"🍄"},corn_seed:{vi:"Hạt Bắp",emoji:"🌽"},tomato_seed:{vi:"Hạt Cà Chua",emoji:"🍅"},cactus_seed:{vi:"Hạt Xương Rồng",emoji:"🌵"},apple_seed:{vi:"Hạt Táo",emoji:"🍎"},grape_seed:{vi:"Hạt Nho",emoji:"🍇"},pumpkin_seed:{vi:"Hạt Bí Ngô",emoji:"🎃"},watermelon_seed:{vi:"Hạt Dưa Hấu",emoji:"🍉"},coconut_seed:{vi:"Hạt Dừa",emoji:"🥥"},mango_seed:{vi:"Hạt Xoài",emoji:"🥭"},bean_seed:{vi:"Hạt Cây Đậu",emoji:"🫘"},star_fruit_seed:{vi:"Hạt Khế",emoji:"⭐"},sugar_apple_seed:{vi:"Hạt Táo Đường",emoji:"🍏"},fig_seed:{vi:"Hạt Sung",emoji:"🍑"},soursop_seed:{vi:"Hạt Mãng Cầu",emoji:"🌿"},papaya_seed:{vi:"Hạt Đu Đủ",emoji:"🧡"},bamboo_seed:{vi:"Hạt Tre",emoji:"🎍"},durian_seed:{vi:"Hạt Sầu Riêng",emoji:"🌰"},cherry_seed:{vi:"Hạt Anh Đào",emoji:"🍒"},daisy_seed_white:{vi:"Hoa Cúc Trắng",emoji:"🌼",rare:true},rose_seed_white:{vi:"Hoa Hồng Trắng",emoji:"🌹",rare:true},hydrangea_seed_white:{vi:"Hoa Cẩm Tú Cầu",emoji:"💐",rare:true},forget_me_not_seed_white:{vi:"Hoa Lưu Ly",emoji:"🩵",rare:true},balloon_flower_seed_white:{vi:"Hoa Cát Cánh",emoji:"🫧",rare:true},morning_glory_seed_white:{vi:"Hoa Loa Kèn",emoji:"🎺",rare:true},lily_of_the_valley_seed_white:{vi:"Hoa Linh Lan",emoji:"🌸",rare:true},trumpet_vine_seed_white:{vi:"Hoa Đăng Tiêu",emoji:"🌺",rare:true}};
const TOOL_INFO={common_sprinkler:{vi:"Vòi Tưới Thường",emoji:"💧"},uncommon_sprinkler:{vi:"Vòi Tưới Cao Cấp",emoji:"🚿"},exceptional_sprinkler:{vi:"Vòi Tưới Siêu Cao Cấp",emoji:"⚡",rare:true},flower_sprinkler:{vi:"Vòi Tưới Hoa",emoji:"🌷",rare:true}};
const WEATHER_INFO={sunny:{vi:"Nắng đẹp",emoji:"☀️",desc:"Điều kiện phát triển bình thường."},rainy:{vi:"Mưa",emoji:"🌧️",desc:"Cây phát triển nhanh hơn!"},windy:{vi:"Có gió",emoji:"💨",desc:"Một số cây có thể bị ảnh hưởng."},cloudy:{vi:"Nhiều mây",emoji:"⛅",desc:"Phát triển chậm hơn một chút."},stormy:{vi:"Bão",emoji:"⛈️",desc:"Cẩn thận — cây dễ tổn thất!"}};
const BASE=window.location.origin;
let countdownId=null;
let theme=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
document.documentElement.setAttribute('data-theme',theme);
function toggleTheme(){theme=theme==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',theme);document.getElementById('theme-icon').innerHTML=theme==='dark'?'<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>':'<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';}
const PAGE_TITLES={shop:'Cửa hàng hôm nay',weather:'Thời tiết',announce:'Thông báo',profile:'Tài khoản'};
function switchPage(name,el){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById('page-'+name).classList.add('active');document.querySelectorAll('.nav-item,.mobile-nav-item').forEach(i=>i.classList.remove('active'));document.querySelectorAll('[data-page="'+name+'"]').forEach(i=>i.classList.add('active'));document.getElementById('page-title').textContent=PAGE_TITLES[name];}
function renderSeeds(list){const g=document.getElementById('seed-grid');document.getElementById('seed-count').textContent=list.length;if(!list.length){g.innerHTML='<div style="grid-column:1/-1;padding:var(--space-8);text-align:center;color:var(--color-text-muted)">Không có hạt giống hôm nay</div>';return;}g.innerHTML=list.map(s=>{const i=SEED_INFO[s.name]||{vi:s.name,emoji:'🌱'};return`<div class="item-card ${i.rare?'rare':''}"><div class="item-emoji">${i.emoji}</div><div><div class="item-name">${i.vi}</div><div class="item-name-en">${s.name}</div></div><div class="item-count ${i.rare?'rare-count':''}">×${s.count}</div></div>`;}).join('');}
function renderTools(list){const g=document.getElementById('tool-grid');document.getElementById('tool-count').textContent=list.length;if(!list.length){g.innerHTML='<div style="padding:var(--space-6);color:var(--color-text-muted)">Không có công cụ hôm nay</div>';return;}g.innerHTML=list.map(t=>{const i=TOOL_INFO[t.name]||{vi:t.name,emoji:'🔧'};return`<div class="tool-card"><div class="tool-emoji">${i.emoji}</div><div class="tool-info"><div class="tool-name">${i.vi}</div><div class="tool-name-en">${t.name}</div></div><div class="tool-qty">${t.count}</div></div>`;}).join('');}
function renderWeather(data){const el=document.getElementById('weather-content');if(!data||!data.today){el.innerHTML='<div class="weather-empty">🌤️ Không có dữ liệu thời tiết hiện tại.</div>';return;}const i=WEATHER_INFO[data.today]||{vi:data.today,emoji:'🌡️',desc:'–'};el.innerHTML=`<div class="weather-card"><div class="weather-emoji">${i.emoji}</div><div><div class="weather-title">${i.vi}</div><div class="weather-sub">${i.desc}</div></div></div>`;}
function renderAnnounce(data){const el=document.getElementById('announce-list');const items=data?.data||[];if(!items.length){el.innerHTML='<div class="announce-empty">📭 Không có thông báo nào.</div>';return;}el.innerHTML=items.map(a=>`<div class="announce-item"><div class="announce-title">${a.title||'Thông báo'}</div><div class="announce-body">${a.body||a.content||''}</div></div>`).join('');}
function renderProfile(p){if(!p)return;document.getElementById('profile-name').textContent=p.displayName||'Người dùng';document.getElementById('profile-email').textContent=p.email||'–';document.getElementById('credit-val').textContent=p.credit??0;document.getElementById('credit-bonus-val').textContent=p.creditBonus??0;const b=document.getElementById('plan-badge');b.textContent=p.plan==='pro'?'⭐ Pro':'Free';b.className='plan-badge '+(p.plan==='pro'?'pro':'free');const accs=p.gameIdAccounts||[];document.getElementById('game-accounts').innerHTML=accs.map(a=>`<div class="account-item"><div><div class="account-id">${a.id||a.gameId}</div><div class="account-name">${a.name||''}</div></div><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--color-success)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>`).join('');}
function startCountdown(){if(countdownId)clearInterval(countdownId);const target=Date.now()+300000;function tick(){const left=Math.max(0,Math.floor((target-Date.now())/1000));const m=String(Math.floor(left/60)).padStart(2,'0');const s=String(left%60).padStart(2,'0');document.getElementById('countdown').textContent=`${m}:${s}`;if(left===0){clearInterval(countdownId);fetchAll();}}tick();countdownId=setInterval(tick,1000);}
async function fetchAll(){const btn=document.getElementById('refresh-btn');btn.classList.add('spinning');btn.disabled=true;try{const[seedR,toolR,weatherR,announceR,profileR]=await Promise.allSettled([fetch(BASE+'/api/latest/seed').then(r=>r.json()),fetch(BASE+'/api/latest/tool').then(r=>r.json()),fetch(BASE+'/api/weather-event/schedule').then(r=>r.json()),fetch(BASE+'/api/announcement/active').then(r=>r.json()),fetch(BASE+'/api/auth/me').then(r=>r.json())]);if(seedR.status==='fulfilled'&&seedR.value?.data){const d=seedR.value.data;renderSeeds(d.data||[]);document.getElementById('slot-number').textContent=`Time Slot ${d.timeSlot||'–'}`;const badge=document.getElementById('slot-badge');badge.textContent=d.isFree?'Miễn phí':'Trả phí';badge.className='slot-badge '+(d.isFree?'free':'paid');startCountdown();}if(toolR.status==='fulfilled'&&toolR.value?.data)renderTools(toolR.value.data.data||[]);if(weatherR.status==='fulfilled')renderWeather(weatherR.value);if(announceR.status==='fulfilled')renderAnnounce(announceR.value);if(profileR.status==='fulfilled')renderProfile(profileR.value);const now=new Date();document.getElementById('last-updated').textContent=`Cập nhật lúc ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;setStatus('connected');}catch(e){setStatus('error');}finally{btn.classList.remove('spinning');btn.disabled=false;}}
function setStatus(s){const dot=document.getElementById('ws-dot');const txt=document.getElementById('ws-status');if(s==='connected'){dot.className='status-dot green';txt.textContent='Đang kết nối';}else{dot.className='status-dot red';txt.textContent='Lỗi kết nối';}}
function formatGameId(input){let v=input.value.toUpperCase().replace(/[^A-Z0-9]/g,'');if(v.length>12)v=v.slice(0,12);input.value=v.match(/.{1,4}/g)?.join('-')||v;}
async function linkGameId(){const inp=document.getElementById('game-id-input');const msg=document.getElementById('game-id-msg');try{const r=await fetch(BASE+'/api/auth/game-id',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({gameId:inp.value.trim()})}).then(x=>x.json());msg.style.display='block';if(r.success||r.ok){msg.className='form-msg ok';msg.textContent='✅ '+(r.message||'Liên kết thành công!');fetchAll();}else{msg.className='form-msg err';msg.textContent='❌ '+(r.message||'Không thành công');}}catch(e){msg.style.display='block';msg.className='form-msg err';msg.textContent='❌ Không kết nối được server';}}
fetchAll();
setInterval(fetchAll,5*60*1000);
</script>
</body>
</html>
